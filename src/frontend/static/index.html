<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15-Day Temperature Forecast</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h1>15-Day Temperature Forecast</h1>
      </div>

      <div class="container">
        <div class="controls">
          <div class="form-group">
            <label for="district">Select District</label>
            <select id="district" class="select-input">
              <option value="">-- Choose a district --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="date">Base Date</label>
            <input type="date" id="date" class="date-input" />
          </div>

          <button id="predictBtn" class="btn-predict">Get Forecast</button>
        </div>

        <div id="alertBox" class="alert-box hidden">
          <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3.05h16.94a2 2 0 0 0 1.71-3.05L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <div id="alertText" class="alert-text"></div>
        </div>

        <div id="chartContainer" class="chart-container hidden">
          <canvas id="temperatureChart"></canvas>
        </div>

        <div id="tableContainer" class="table-container hidden">
          <table class="forecast-table">
            <thead>
              <tr>
                <th>Day</th>
                <th>Date</th>
                <th>Day of Week</th>
                <th>Predicted Tmax (°C)</th>
                <th>Actual Tmax (°C)</th>
                <th>RMSE</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
